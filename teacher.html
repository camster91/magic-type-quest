<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloomType — Teacher Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="/assets/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0d2e; --text: #f0e6ff; --text-dim: #a78bfa;
      --primary: #8B5CF6; --primary-light: #A78BFA; --accent: #EC4899;
      --success: #34D399; --danger: #EF4444; --warning: #FBBF24;
      --glass: rgba(255,255,255,0.08); --glass-border: rgba(255,255,255,0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 20px;
    }
    h1 { font-family: 'Fredoka One', cursive; font-size: 2rem; margin-bottom: 8px; }
    .subtitle { color: var(--text-dim); margin-bottom: 24px; }

    /* Mode Toggle */
    .mode-bar {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .mode-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--glass-border);
      background: var(--glass); color: var(--text-dim); cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.8rem;
      transition: all 0.2s;
    }
    .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary-light); }

    /* Toolbar */
    .toolbar {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;
      align-items: center;
    }
    .btn {
      padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-export { background: var(--success); color: #0f0d2e; }
    .btn-danger { background: var(--danger); color: white; }
    .input-code {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-family: 'Nunito', sans-serif; font-size: 0.9rem; width: 200px;
    }
    .class-badge {
      font-size: 0.85rem; color: var(--accent); font-weight: 700;
      background: rgba(236,72,153,0.15); padding: 4px 12px; border-radius: 20px;
    }

    /* Alerts */
    .alert-panel { margin-bottom: 16px; }
    .alert-banner {
      display: flex; align-items: center; gap: 10px;
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 12px 16px; color: var(--danger);
      font-size: 0.9rem; font-weight: 700;
    }
    .alert-icon { font-size: 1.2rem; }
    .hidden { display: none !important; }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .stat-value { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

    /* Table */
    .table-wrap {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 12px; overflow: hidden; margin-bottom: 24px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: rgba(139,92,246,0.2); padding: 12px 16px; text-align: left; font-weight: 700; }
    td { padding: 10px 16px; border-top: 1px solid var(--glass-border); }
    tr:hover td { background: rgba(255,255,255,0.04); }
    .student-avatar { font-size: 1.4rem; margin-right: 6px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .badge-green { background: rgba(52,211,153,0.2); color: var(--success); }
    .badge-yellow { background: rgba(251,191,36,0.2); color: var(--warning); }
    .badge-red { background: rgba(239,68,68,0.2); color: var(--danger); }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty-state h2 { font-family: 'Fredoka One', cursive; margin-bottom: 12px; color: var(--text); }
  </style>
  <script type="module" crossorigin src="/assets/teacher-BJPPVDai.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/utils-D1nKtxFV.js">
</head>
<body>
  <h1>🌸 BloomType Teacher Dashboard</h1>
  <p class="subtitle">Track typing progress for your classroom.</p>

  <div class="mode-bar">
    <button class="mode-btn active" id="btn-local-mode" data-mode="local">💾 Local</button>
    <button class="mode-btn" id="btn-cloud-mode" data-mode="cloud">☁️ Cloud</button>
  </div>

  <div class="toolbar">
    <label for="class-code-input" class="sr-only">Class Code</label>
    <input type="text" id="class-code-input" class="input-code" placeholder="Class code (e.g. ABC123)" maxlength="10">
    <button class="btn btn-primary" id="btn-load-class">🔍 Load Class</button>
    <button class="btn btn-primary" id="btn-all-students">🔄 All Students</button>
    <button class="btn btn-export" id="btn-export-csv">📊 Export CSV</button>
    <button class="btn btn-export" id="btn-export-json">📋 Export JSON</button>
    <button class="btn btn-danger" id="btn-clear-data">🗑 Clear All</button>
    <span class="class-badge" id="class-code-display">All Students (Local)</span>
  </div>

  <div id="alert-panel" class="alert-panel hidden"></div>

  <div id="stats-grid" class="stats-grid"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>Level</th>
          <th>Words</th>
          <th>Score</th>
          <th>Stars</th>
          <th>Status</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody id="student-body"></tbody>
    </table>
  </div>

  <div id="empty-state" class="empty-state hidden">
    <h2>No data yet</h2>
    <p>Students will appear here after they play BloomType. 🌸</p>
  </div>

  <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
